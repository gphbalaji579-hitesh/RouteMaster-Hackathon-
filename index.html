<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteMaster Pathfinding App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #canvas {
            border: 1px solid #000;
            margin-bottom: 20px;
        }
        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>RouteMaster Pathfinding App</h1>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div id="controls">
        <input type="text" id="start" placeholder="Start Node (e.g., 0,0)">
        <input type="text" id="end" placeholder="End Node (e.g., 9,9)">
        <button id="findPath">Find Path</button>
        <button id="clear">Clear</button>
    </div>
    <script>
        // JavaScript for handling canvas and pathfinding logic goes here.
    </script>
</body>
</html>
